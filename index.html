<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="CarbonCut helps users calculate, track, and reduce their carbon footprint through personalized sustainability recommendations.">

    <title>CarbonCut</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="container">

        <!-- LEFT PANEL -->

        <div class="left-panel">

            <h1>🌱 CarbonCut</h1>

            <p class="subtitle">
                Understand your carbon footprint and get personalized sustainability recommendations.
            </p>

            <!-- Transport -->

            <label for="transport">
                🚗 Transport Method
            </label>

            <select
                id="transport"
                aria-label="Transportation method">

                <option value="car">Car</option>
                <option value="bus">Bus</option>
                <option value="metro">Metro</option>
                <option value="bike">Bike</option>

            </select>

            <!-- Distance -->

            <label for="distance">
                📍 Daily Distance (km)
            </label>

            <input
                type="number"
                id="distance"
                aria-label="Daily travel distance in kilometers"
                placeholder="Enter distance travelled per day">

            <!-- AC -->

            <label for="ac">
                ❄️ AC Usage (hours/day)
            </label>

            <input
                type="number"
                id="ac"
                aria-label="Air conditioner usage in hours per day"
                placeholder="Enter AC usage hours">

            <!-- Diet -->

            <label for="diet">
                🥗 Diet Type
            </label>

            <select
                id="diet"
                aria-label="Diet type">

                <option value="veg">Vegetarian</option>
                <option value="mixed">Mixed</option>
                <option value="meat">Meat Heavy</option>

            </select>

            <!-- Goal -->

            <label for="goal">
                🎯 Target Carbon Score
            </label>

            <input
                type="number"
                id="goal"
                aria-label="Target carbon score"
                placeholder="Example: 50">

            <!-- Button -->

            <button
                onclick="calculateFootprint()"
                aria-label="Calculate Carbon Footprint">

                Calculate Carbon Footprint

            </button>

        </div>

        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <!-- Results -->

            <div
                id="result"
                aria-live="polite">

                <h3>📊 Results</h3>

                <p>
                    Fill the form and calculate your carbon footprint.
                </p>

            </div>

            <!-- Chart -->

            <div class="chart-container">

                <h3>📈 Carbon Score Trend</h3>

                <canvas
                    id="carbonChart"
                    aria-label="Carbon score trend chart">
                </canvas>

            </div>

        </div>

    </main>

    <!-- Chart.js -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Application Script -->

    <script src="script.js"></script>

</body>

</html>
